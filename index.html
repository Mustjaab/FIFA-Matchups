<!DOCTYPE HTML>
<html>
<head>

<link rel="icon" href="https://fav.farm/⚽" />
<meta charset="UTF-8" />

<style>
#div1 {
  width: 350px;
  height: 70px;
  padding: 10px;
  border: 1px solid #aaaaaa;
}

#div2 {
  width: 350px;
  height: 70px;
  padding: 10px;
  border: 1px solid #aaaaaa;
}
</style>
<script>
function allowDrop(ev) {
  ev.preventDefault();
}

function drag(ev) {
  ev.dataTransfer.setData("Text", ev.target.id);
}

function drop(ev) {
  let data = ev.dataTransfer.getData("Text");
  ev.target.appendChild(document.getElementById(data));
  ev.preventDefault();
}
</script>
</head>
<body>

<h1> <center> FIFA World Cup Matchups </center> </h1> 

<strong> Favor </strong>
<div id="div1" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
<br>
<strong> Predicted Win </strong>
<div id="div2" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
<br>
<p id="drag1" draggable="true" ondragstart="drag(event)">England</p>
<p id="drag2" draggable="true" ondragstart="drag(event)"> Portugal </p>

</body>
</html>
