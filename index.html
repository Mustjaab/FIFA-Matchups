<!DOCTYPE HTML>
<html>
<head>

<link rel="icon" href="https://fav.farm/⚽" />
<meta charset="UTF-8" />

<style>
#div1 {
  width: 350px;
  height: 70px;
  padding: 10px;
  border: 1px solid #aaaaaa;
}

#div2 {
  width: 350px;
  height: 70px;
  padding: 10px;
  border: 1px solid #aaaaaa;
}

p {
  border-width: 6px; 
  border-style: solid;
  border-color: grey; 
  padding: 10px; 
  margin: 5px;
  display: inline-block;
  background-color: white;
}
</style>
<script>
function allowDrop(ev) {
  ev.preventDefault();
}

function drag(ev) {
  ev.dataTransfer.setData("Text", ev.target.id);
}

function drop(ev) {
  let data = ev.dataTransfer.getData("Text");
  ev.target.appendChild(document.getElementById(data));
  ev.preventDefault();
}
</script>
</head>
<body>

<h1> <center> FIFA World Cup Matchups </center> </h1> 

<strong> <center> Drag countries into each box. </center> </strong>

<strong> Favor </strong>
<div id="div1" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
<br>
<strong> Predicted Win </strong>
<div id="div2" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
<br>
<p id="drag1" draggable="true" ondragstart="drag(event)"> Argentina </p>
<p id="drag2" draggable="true" ondragstart="drag(event)"> Austria </p>
<p id="drag3" draggable="true" ondragstart="drag(event)"> Norway </p>
<p id="drag4" draggable="true" ondragstart="drag(event)"> Senegal </p>
<p id="drag5" draggable="true" ondragstart="drag(event)"> France </p>
<p id="drag6" draggable="true" ondragstart="drag(event)"> Iraq </p>
<p id="drag7" draggable="true" ondragstart="drag(event)"> Algeria </p>
<p id="drag8" draggable="true" ondragstart="drag(event)"> Jordan </p>
  
</body>
</html>
